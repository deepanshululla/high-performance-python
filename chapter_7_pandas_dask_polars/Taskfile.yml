# Chapter 7 — Pandas, Dask, Polars.
# Standalone:  cd chapter_7_pandas_dask_polars && task
# From root:   task ch7:<name>
version: '3'

vars:
  ROOT:
    sh: cd .. && pwd
  PY: '{{.ROOT}}/.venv/bin/python'

tasks:
  default:
    desc: List Chapter 7 tasks
    cmds: [task --list]
    silent: true

  run:
    desc: 'Run a Chapter 7 script: task ch7:run -- ex01_ols_sklearn_vs_lstsq/ex01_ols_sklearn_vs_lstsq.py'
    cmds: ['{{.PY}} {{.CLI_ARGS}}']

  viz:
    desc: Regenerate Chapter 7 exercise + hypothesis charts and dashboards (slow — Dask)
    cmds:
      - '{{.PY}} visualize_exercises.py'
      - '[ -f hypothesis/visualize.py ] && {{.PY}} hypothesis/visualize.py || true'

  smoke:
    desc: Run every Chapter 7 exercise and hypothesis (fail on first error)
    cmds:
      - |
        ran=0
        for s in ex*/ex*.py hypothesis/h*/*.py; do
          case "$s" in */plot.py|*/visualize.py) continue;; esac
          [ -f "$s" ] || continue
          echo "== $s =="; {{.PY}} "$s" >/dev/null || { echo "FAILED: $s"; exit 1; }
          ran=$((ran+1))
        done
        echo "ok — $ran scripts passed"
