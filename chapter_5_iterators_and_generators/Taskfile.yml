# Chapter 5 — Iterators and Generators.
# Standalone:  cd chapter_5_iterators_and_generators && task
# From root:   task ch5:<name>
version: '3'

vars:
  ROOT:
    sh: cd .. && pwd
  PY: '{{.ROOT}}/.venv/bin/python'

tasks:
  default:
    desc: List Chapter 5 tasks
    cmds: [task --list]
    silent: true

  run:
    desc: 'Run a Chapter 5 script: task ch5:run -- ex03_len_trap/ex03_len_trap.py'
    cmds: ['{{.PY}} {{.CLI_ARGS}}']

  viz:
    desc: Regenerate every Chapter 5 chart (per-exercise plot.py)
    cmds:
      - |
        for p in ex*/plot.py hypothesis/*/plot.py; do
          [ -f "$p" ] && { echo "== $p =="; {{.PY}} "$p"; }
        done

  smoke:
    desc: Run every Chapter 5 exercise and hypothesis (fail on first error)
    cmds:
      - |
        ran=0
        for s in ex*/ex*.py hypothesis/h*/*.py; do
          case "$s" in */plot.py|*/visualize.py) continue;; esac
          [ -f "$s" ] || continue
          echo "== $s =="; {{.PY}} "$s" >/dev/null || { echo "FAILED: $s"; exit 1; }
          ran=$((ran+1))
        done
        echo "ok — $ran scripts passed"
