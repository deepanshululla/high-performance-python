# Chapter 6 — Matrix and Vector Computation.
# Standalone:  cd chapter_6_matrix_and_vector_computation && task
# From root:   task ch6:<name>
version: '3'

vars:
  ROOT:
    sh: cd .. && pwd
  PY: '{{.ROOT}}/.venv/bin/python'

tasks:
  default:
    desc: List Chapter 6 tasks
    cmds: [task --list]
    silent: true

  run:
    desc: 'Run a Chapter 6 script: task ch6:run -- ex01_list_vs_numpy_norm/ex01_list_vs_numpy_norm.py'
    cmds: ['{{.PY}} {{.CLI_ARGS}}']

  viz:
    desc: Regenerate Chapter 6 exercise + hypothesis charts and dashboards
    cmds:
      - '{{.PY}} visualize_exercises.py'
      - '[ -f hypothesis/visualize.py ] && {{.PY}} hypothesis/visualize.py || true'

  smoke:
    desc: Run every Chapter 6 exercise and hypothesis (fail on first error)
    cmds:
      - |
        ran=0
        for s in ex*/ex*.py hypothesis/h*/*.py; do
          case "$s" in */plot.py|*/visualize.py) continue;; esac
          [ -f "$s" ] || continue
          echo "== $s =="; {{.PY}} "$s" >/dev/null || { echo "FAILED: $s"; exit 1; }
          ran=$((ran+1))
        done
        echo "ok — $ran scripts passed"
